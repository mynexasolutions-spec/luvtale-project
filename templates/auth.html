<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up | Luvtale</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #CC0D39;
            --secondary: #000;
            --light: #FFFAF3;
            --light-dark: #FEEB9D;
            --body: #5E626F;
            --title: #000;
            --border: #D7D7D7;
            --white: #fff;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--light);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-card {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid var(--light-dark);
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--secondary);
            letter-spacing: -1px;
        }

        .brand-logo span {
            color: var(--primary);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1.5px solid var(--light-dark);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--body);
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .auth-tab.active {
            color: var(--secondary);
            border-bottom-color: var(--primary);
        }

        .auth-form {
            display: none;
            text-align: left;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--title);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            font-size: 0.95rem;
            background: var(--white);
        }

        .form-group input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(204, 13, 57, 0.05);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: var(--secondary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(204, 13, 57, 0.15);
        }

        .auth-footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--body);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .alert-error { background: #fee2e2; color: #ef4444; }
        .alert-success { background: #ecfdf5; color: #10b981; }
        .alert-info { background: #e0f2fe; color: #0ea5e9; }

        .back-home {
            margin-top: 25px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--body);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-home:hover { color: var(--primary); }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-logo">Luvt<span>ale</span></div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab">Login</div>
                <div class="auth-tab" id="signupTab">Sign Up</div>
            </div>

            <!-- Login Form -->
            <form action="{{ url_for('login') }}" method="POST" class="auth-form active" id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
                <div class="auth-footer">
                    <p>Forgot password? <a href="#">Reset it</a></p>
                </div>
            </form>

            <!-- Signup Form -->
            <form action="{{ url_for('signup') }}" method="POST" class="auth-form" id="signupForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Min. 8 characters" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">Create Account</button>
                <div class="auth-footer">
                    <p>Already have an account? <a href="#" onclick="document.getElementById('loginTab').click()">Login</a></p>
                </div>
            </form>

            <a href="{{ url_for('home') }}" class="back-home"><i class="fas fa-arrow-left"></i> Back to Store</a>
        </div>
    </div>

    <script>
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            loginForm.classList.add('active');
            signupForm.classList.remove('active');
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            signupForm.classList.add('active');
            loginForm.classList.remove('active');
        });
    </script>
</body>

</html>
