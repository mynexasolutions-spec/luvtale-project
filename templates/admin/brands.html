{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <div class="header-left">
        <h1>Brands</h1>
        <p>Manage your product brands.</p>
    </div>
    <div class="header-right">
        <a href="{{ url_for('admin_add_brand') }}" class="btn btn-primary"><i class="fas fa-plus"></i> Add Brand</a>
    </div>
</div>

<div class="section-card">
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Logo</th>
                    <th>Brand Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for brand in brands %}
                <tr>
                    <td>#{{ brand.id }}</td>
                    <td>
                        {% if brand.logo %}
                        <img src="{{ brand.logo }}" alt="" style="width: 40px; height: 40px; object-fit: contain; border-radius: 8px; border: 1px solid #eee;">
                        {% else %}
                        <div style="width: 40px; height: 40px; background: #f5f5f5; border-radius: 8px; display: flex; align-items: center; justify-content: center;"><i class="fas fa-image" style="color: #ccc;"></i></div>
                        {% endif %}
                    </td>
                    <td>{{ brand.name }}</td>
                    <td>
                        <a href="{{ url_for('admin_edit_brand', id=brand.id) }}" class="btn btn-icon"><i class="fas fa-edit"></i></a>
                        <a href="{{ url_for('admin_delete_brand', id=brand.id) }}" class="btn-icon delete" onclick="return confirm('Are you sure?')"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" style="text-align:center">No brands found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
