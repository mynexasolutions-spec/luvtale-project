{% extends "admin/base.html" %}

{% block content %}
<div class="page-header" style="margin-bottom: 30px;">
    <div class="header-left">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 5px;">{{ title }}</h1>
    </div>
</div>

<div class="section-card" style="background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); padding: 40px; max-width: 800px;">
    <form action="{{ url_for('admin_add_coupon') }}" method="POST">
        <div class="form-group" style="margin-bottom: 30px;">
            <label style="display: block; margin-bottom: 12px; font-weight: 700; color: var(--secondary);">Coupon Name *</label>
            <input type="text" name="code" placeholder="E.G. SAVE20" required style="width: 100%; padding: 15px; border: 1.5px solid #eee; border-radius: 12px; font-family: inherit; text-transform: uppercase;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
            <div class="form-group">
                <label style="display: block; margin-bottom: 12px; font-weight: 700; color: var(--secondary);">Discount Type *</label>
                <select name="discount_type" required style="width: 100%; padding: 15px; border: 1.5px solid #eee; border-radius: 12px; font-family: inherit; appearance: none; background: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23000%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22/%3E%3C/svg%3E') no-repeat right 15px top 50%; background-size: 12px; background-color: #fff;">
                    <option value="Percentage">Percentage - Discount (%)</option>
                    <option value="Flat">Flat Rate — Discount (₹)</option>
                </select>
            </div>
            <div class="form-group">
                <label style="display: block; margin-bottom: 12px; font-weight: 700; color: var(--secondary);">Discount Value *</label>
                <input type="number" name="discount_value" placeholder="e.g. 20" required style="width: 100%; padding: 15px; border: 1.5px solid #eee; border-radius: 12px; font-family: inherit;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
            <div class="form-group">
                <label style="display: block; margin-bottom: 12px; font-weight: 700; color: var(--secondary);">Threshold Order Value (₹)</label>
                <input type="number" name="threshold" value="0" style="width: 100%; padding: 15px; border: 1.5px solid #eee; border-radius: 12px; font-family: inherit;">
            </div>
            <div class="form-group">
                <label style="display: block; margin-bottom: 12px; font-weight: 700; color: var(--secondary);">Maximum number of usage by single user</label>
                <input type="number" name="max_usage" value="1" style="width: 100%; padding: 15px; border: 1.5px solid #eee; border-radius: 12px; font-family: inherit;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; align-items: center;">
            <div class="form-group">
                <label style="display: block; margin-bottom: 12px; font-weight: 700; color: var(--secondary);">Expiry Date</label>
                <input type="date" name="expiry_date" style="width: 100%; padding: 15px; border: 1.5px solid #eee; border-radius: 12px; font-family: inherit;">
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 10px; padding-top: 30px;">
                <input type="checkbox" name="is_active" id="isActive" checked style="width: 20px; height: 20px; cursor: pointer;">
                <label for="isActive" style="font-weight: 700; color: var(--secondary); cursor: pointer;">Active</label>
            </div>
        </div>

        <div style="display: flex; gap: 15px;">
            <button type="submit" class="btn btn-primary" style="padding: 15px 40px; border-radius: 15px; font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 10px;"><i class="fas fa-save"></i> Create Coupon</button>
            <a href="{{ url_for('admin_coupons') }}" class="btn" style="padding: 15px 40px; border-radius: 15px; font-weight: 700; font-size: 1rem; background: #FDE2E7; color: var(--primary);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
